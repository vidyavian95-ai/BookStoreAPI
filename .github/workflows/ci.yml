name: BookStore API CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================
  # STAGE 1: CHECKOUT
  # ============================================
  checkout:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Upload source code artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .
          retention-days: 1

  # ============================================
  # STAGE 2: BUILD (Maven + SpotBugs + SonarQube)
  # ============================================
  build:
    name: Build, Test & Code Analysis
    needs: checkout
    runs-on: ubuntu-latest
      
    steps:  
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Maven Build
        run: |
          echo "Building application with Maven..."
          mvn clean package -DskipTests

      - name: Run SpotBugs Analysis
        run: |
          echo "Running SpotBugs static analysis..."
          mvn spotbugs:spotbugs
          mvn com.github.spotbugs:spotbugs-maven-plugin:4.8.6.1:check

      - name: Upload SpotBugs Report
        uses: lcollins/spotbugs-github-action@v3.2.0
        with:
          path: '**/spotbugsXml.xml'

      - name: SonarQube Code Quality Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=vidyavian95-ai
            -Dsonar.projectKey=vidyavian95-ai_BookStoreAPI
            -Dsonar.projectName=BookStoreAPI
            -Dsonar.java.binaries=target/classes 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bookstore_api_build
          path: |
            target/*.jar
            deployment/
          retention-days: 1

  # ============================================
  # STAGE 3: DEPLOY (Docker + EKS)
  # ============================================
  deploy:
    name: Deploy to EKS Cluster
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_build
          path: .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REGISTRY_ALIAS: demodevops
          REPOSITORY: bookstoreapi
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image..."
          docker build -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest
          
          echo "Pushing Docker images to ECR..."
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest

      - name: Update EKS kubeconfig
        run: |
          echo "Configuring kubectl for EKS cluster..."
          aws eks update-kubeconfig --region ap-south-1 --name bookstoreApi-cluster --alias bookstoreApi

      - name: Configure EKS aws-auth for IAM user
        run: |
          echo "Configuring aws-auth ConfigMap for IAM user access..."
          
          # Get the IAM user ARN
          IAM_USER_ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "Current IAM user: $IAM_USER_ARN"
          
          # Create aws-auth configuration file
          cat > aws-auth-config.yaml << 'HEREDOC'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aws-auth
            namespace: kube-system
          data:
            mapUsers: |
              - userarn: IAM_USER_ARN_PLACEHOLDER
                username: demo_devops
                groups:
                  - system:masters
          HEREDOC
          
          # Replace placeholder with actual ARN
          sed -i "s|IAM_USER_ARN_PLACEHOLDER|$IAM_USER_ARN|g" aws-auth-config.yaml
          
          # Check if aws-auth ConfigMap exists
          if kubectl get configmap aws-auth -n kube-system &>/dev/null; then
            echo "aws-auth ConfigMap exists, backing it up..."
            kubectl get configmap aws-auth -n kube-system -o yaml > aws-auth-backup.yaml
            
            # Get current mapUsers
            CURRENT_MAP=$(kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapUsers}' || echo "")
            
            # Check if user already exists
            if echo "$CURRENT_MAP" | grep -q "$IAM_USER_ARN"; then
              echo "IAM user already configured in aws-auth"
            else
              echo "Adding IAM user to existing aws-auth ConfigMap..."
              kubectl apply -f aws-auth-config.yaml
            fi
          else
            echo "aws-auth ConfigMap does not exist, creating it..."
            kubectl apply -f aws-auth-config.yaml
          fi
          
          echo "aws-auth configuration completed successfully"

      - name: Verify EKS Access
        run: |
          echo "Verifying EKS cluster access..."
          kubectl version --client
          kubectl cluster-info
          kubectl auth can-i get pods --all-namespaces

      - name: Deploy to EKS Cluster
        env:
          AWS_REGION: ap-south-1
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          echo "Deploying application to EKS cluster..."
          kubectl apply -f deployment/deployment.yaml --validate=false
          kubectl apply -f deployment/service.yaml --validate=false
          kubectl apply -f deployment/ingress.yaml --validate=false
          echo "Deployment completed successfully"

      - name: Verify Deployment Status
        run: |
          echo "Verifying deployment status..."
          kubectl get deployments -n default
          kubectl get pods -n default
          kubectl get services -n default
          kubectl get ingress -n default
          
          echo "Waiting for deployment rollout..."
          kubectl rollout status deployment/bookstoreapi -n default --timeout=5m

  # ============================================
  # STAGE 4: TEST CASE EXECUTION
  # ============================================
  test:
    name: Execute Test Cases
    needs: deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          mvn test -Dspring.profiles.active=test

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          mvn verify -Dspring.profiles.active=test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml

      - name: Upload Test Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      build:
    needs: checkout
    runs-on: ubuntu-latest
      
    steps:  
      - name: download src code
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .