name: java build pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout src code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

  build:
    needs: checkout
    runs-on: ubuntu-latest
      
    steps:  
      - name: download src code
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: verify dir
        run: ls -lrt && pwd

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=vidyavian95-ai
            -Dsonar.projectKey=vidyavian95-ai_BookStoreAPI
            -Dsonar.projectName=BookStoreAPI
            -Dsonar.java.binaries=target/classes 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build with Maven
        run: mvn clean verify com.github.spotbugs:spotbugs-maven-plugin:4.8.6.1:check

      - name: Run SpotBugs
        run: mvn spotbugs:spotbugs

      - name: Upload SpotBugs Report
        uses: lcollins/spotbugs-github-action@v3.2.0
        with:
            path: '**/spotbugsXml.xml'


      - name: Java installation
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Maven build & Run Tests
        run: mvn clean verify -Dspring.profiles.active=test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build, tag, and push docker image to Amazon ECR 
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REGISTRY_ALIAS: demodevops
          REPOSITORY: bookstoreapi
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest .
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest

     # - name: Deploy to EB
     #   uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.2
     #   with:
     #       application-name: "demo-9271-2087-0716-bookstoreapi"
     #       environment-name: "Demo-9271-2087-0716-bookstoreapi-env"
     #       version-label: ${{ github.sha }}
     #       aws-region: "ap-south-1"
     #       deployment-package: Dockerrun.aws.json

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name bookstoreApi-cluster --alias bookstoreApi

      - name: Configure EKS aws-auth for IAM user
        run: |
          echo "Checking and configuring aws-auth ConfigMap..."
          
          # Get the IAM user ARN
          IAM_USER_ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "Current IAM user: $IAM_USER_ARN"
          
          # Check if aws-auth ConfigMap exists
          if kubectl get configmap aws-auth -n kube-system &>/dev/null; then
            echo "aws-auth ConfigMap exists, backing it up..."
            kubectl get configmap aws-auth -n kube-system -o yaml > aws-auth-backup.yaml
            
            # Get current mapUsers
            CURRENT_MAP=$(kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapUsers}' || echo "")
            
            # Check if user already exists
            if echo "$CURRENT_MAP" | grep -q "$IAM_USER_ARN"; then
              echo "IAM user already configured in aws-auth"
            else
              echo "Adding IAM user to existing aws-auth ConfigMap..."
              kubectl patch configmap aws-auth -n kube-system --patch "$(cat <<EOF
data:
  mapUsers: |
    - userarn: $IAM_USER_ARN
      username: demo_devops
      groups:
        - system:masters
EOF
)"
            fi
          else
            echo "aws-auth ConfigMap does not exist, creating it..."
            kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aws-auth
            namespace: kube-system
          data:
            mapUsers: |
              - userarn: $IAM_USER_ARN
                username: demo_devops
                groups:
                  - system:masters
          EOF
          fi
          
          echo "aws-auth configuration completed"
          
      - name: Verify EKS access
        run: |
          echo "Testing EKS cluster access..."
          kubectl version --client
          kubectl cluster-info
          kubectl auth can-i get pods --all-namespaces
          
      - name: Deploy to EKS
        env:
          AWS_REGION: ap-south-1
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          echo "Deploying to EKS cluster..."
          kubectl apply -f deployment/deployment.yaml --validate=false
          kubectl apply -f deployment/service.yaml --validate=false
          kubectl apply -f deployment/ingress.yaml --validate=false

      - name: Verify deployment
        run: |
          echo "Verifying deployment status..."
          kubectl get pods -n default
          kubectl get services -n default
          kubectl get ingress -n default
          kubectl rollout status deployment -n default --timeout=5m || true
      
      