name: BookStore API CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================
  # STAGE 1: CHECKOUT
  # ============================================
  checkout:
    name: "Stage 1: Checkout Source Code"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Upload source code artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .
          retention-days: 1

  # ============================================
  # STAGE 2: BUILD
  # ============================================
  
  # Sub-Stage 2.1: Maven Build
  maven-build:
    name: "Stage 2.1: Maven Build"
    needs: checkout
    runs-on: ubuntu-latest
      
    steps:  
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Maven Clean and Package
        run: |
          echo "========================================"
          echo "Building application with Maven..."
          echo "========================================"
          mvn clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bookstore_api_build
          path: |
            target/*.jar
            target/classes/
            deployment/
          retention-days: 1

  # Sub-Stage 2.2: SpotBugs Analysis
  spotbugs-analysis:
    name: "Stage 2.2: SpotBugs Static Analysis"
    needs: maven-build
    runs-on: ubuntu-latest
      
    steps:  
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_build
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Run SpotBugs Analysis
        run: |
          echo "========================================"
          echo "Running SpotBugs Static Code Analysis..."
          echo "========================================"
          mvn spotbugs:spotbugs
          mvn com.github.spotbugs:spotbugs-maven-plugin:4.8.6.1:check

      - name: Upload SpotBugs Report
        uses: lcollins/spotbugs-github-action@v3.2.0
        with:
          path: '**/spotbugsXml.xml'

  # Sub-Stage 2.3: SonarQube Analysis
  sonarqube-analysis:
    name: "Stage 2.3: SonarQube Code Quality Scan"
    needs: maven-build
    runs-on: ubuntu-latest
      
    steps:  
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_build
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=vidyavian95-ai
            -Dsonar.projectKey=vidyavian95-ai_BookStoreAPI
            -Dsonar.projectName=BookStoreAPI
            -Dsonar.java.binaries=target/classes 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate Check
        run: |
          echo "========================================"
          echo "SonarQube Analysis Completed"
          echo "========================================"

  # ============================================
  # STAGE 3: DEPLOY
  # ============================================
  
  # Sub-Stage 3.1: Build and Push Docker Image
  docker-build-push:
    name: "Stage 3.1: Build & Push Docker Image"
    needs: checkout
   # needs: [spotbugs-analysis, sonarqube-analysis]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      #- name: Download build artifacts
      #  uses: actions/download-artifact@v4
      #  with:
      #    name: bookstore_api_src_code
      #    path: .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REGISTRY_ALIAS: demodevops
          REPOSITORY: bookstoreapi
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "========================================"
          echo "Building Docker Image..."
          echo "========================================"
          docker build -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest
          echo "Image tagged: $IMAGE_TAG and latest"

      - name: Push Docker Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REGISTRY_ALIAS: demodevops
          REPOSITORY: bookstoreapi
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "========================================"
          echo "Pushing Docker Image to Amazon ECR..."
          echo "========================================"
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:latest
          echo "Image pushed successfully!"

  # Sub-Stage 3.2: Configure EKS Access
  configure-eks:
    name: "Stage 3.2: Configure EKS Access"
    needs: docker-build-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: |
          echo "========================================"
          echo "Verifying AWS Identity..."
          echo "========================================"
          IAM_USER_ARN=$(aws sts get-caller-identity --query Arn --output text)
          IAM_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "IAM User ARN: $IAM_USER_ARN"
          echo "Account ID: $IAM_ACCOUNT_ID"
          echo ""

      - name: Update EKS kubeconfig
        run: |
          echo "========================================"
          echo "Configuring kubectl for EKS cluster..."
          echo "========================================"
          # Update kubeconfig for the correct cluster name
          aws eks update-kubeconfig --region ap-south-1 --name bookstoreapi-cluster
          echo "Kubeconfig updated successfully"
          echo ""
          echo "Current kubeconfig context:"
          kubectl config current-context

      - name: Verify EKS Access with Retry
        run: |
          echo "========================================"
          echo "Testing EKS Cluster Access..."
          echo "========================================"
          kubectl version --client
          echo ""
          echo "Attempting to access cluster..."
          
          # Retry logic with exponential backoff
          MAX_ATTEMPTS=5
          ATTEMPT=1
          WAIT_TIME=10
          SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo ""
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            if kubectl get nodes 2>&1 | tee kubectl-test.log; then
              if ! grep -qE "Unauthorized|credentials|forbidden" kubectl-test.log; then
                echo "✓ EKS access verified successfully"
                echo ""
                echo "Cluster nodes:"
                kubectl get nodes
                echo ""
                echo "Checking permissions..."
                kubectl auth can-i get pods --all-namespaces || true
                SUCCESS=true
                break
              fi
            fi
            
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "❌ EKS access failed. Retrying in ${WAIT_TIME}s..."
              sleep $WAIT_TIME
              WAIT_TIME=$((WAIT_TIME * 2))
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          if [ "$SUCCESS" = false ]; then
            echo ""
            echo "✗ Unable to access EKS cluster after $MAX_ATTEMPTS attempts"
            echo ""
            echo "Authentication Error Detected!"
            echo "---------------------------------------"
            echo "Current IAM User: $(aws sts get-caller-identity --query Arn --output text)"
            echo ""
            echo "Debugging checklist:"
            echo "1. Verify IAM user has eks:DescribeCluster permission"
            echo "2. Check aws-auth ConfigMap:"
            echo "   kubectl get configmap aws-auth -n kube-system -o yaml"
            echo "3. Verify user is in mapUsers section with correct ARN"
            echo "4. Check kubeconfig:"
            echo "   cat ~/.kube/config"
            echo ""
            exit 1
          fi

  # Sub-Stage 3.3: Deploy to EKS
  deploy-to-eks:
    name: "Stage 3.3: Deploy to EKS Cluster"
    needs: configure-eks
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update EKS kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name bookstoreapi-cluster

      - name: Deploy Application to EKS
        env:
          AWS_REGION: ap-south-1
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          echo "========================================"
          echo "Deploying Application to EKS..."
          echo "========================================"
          kubectl apply -f deployment/deployment.yaml --validate=false
          echo "Deployment applied"
          kubectl apply -f deployment/service.yaml --validate=false
          echo "Service applied"
          kubectl apply -f deployment/ingress.yaml --validate=false
          echo "Ingress applied"
          echo "Deployment completed successfully!"

      - name: Verify Deployment
        run: |
          echo "========================================"
          echo "Verifying Deployment Status..."
          echo "========================================"
          kubectl get deployments -n default
          kubectl get pods -n default
          kubectl get services -n default
          kubectl get ingress -n default
          
          echo ""
          echo "Waiting for deployment rollout to complete..."
          kubectl rollout status deployment/bookstoreapi -n default --timeout=5m
          echo "Deployment verified successfully!"

  # ============================================
  # STAGE 4: TEST CASE EXECUTION
  # ============================================
  
  # Sub-Stage 4.1: Unit Tests
  unit-tests:
    name: "Stage 4.1: Unit Tests"
    needs: [ deploy-to-eks, spotbugs-analysis, sonarqube-analysis ]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Run Unit Tests
        run: |
          echo "========================================"
          echo "Running Unit Tests..."
          echo "========================================"
          mvn test -Dspring.profiles.active=test

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 7

  # Sub-Stage 4.2: Integration Tests
  integration-tests:
    name: "Stage 4.2: Integration Tests"
    needs: deploy-to-eks
    runs-on: ubuntu-latest
    
    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: bookstore_api_src_code
          path: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: './pom.xml'

      - name: Run Integration Tests
        run: |
          echo "========================================"
          echo "Running Integration Tests..."
          echo "========================================"
          mvn verify -Dspring.profiles.active=test

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/
          retention-days: 7

  # Sub-Stage 4.3: Test Report Publishing
  publish-test-reports:
    name: "Stage 4.3: Publish Test Reports"
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download Unit Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: unit-test-results/

      - name: Download Integration Test Results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-results/

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            unit-test-results/*.xml
            integration-test-results/*.xml

      - name: Test Summary
        run: |
          echo "========================================"
          echo "Test Execution Complete!"
          echo "========================================"
          echo "Unit Test Results: Available in artifacts"
          echo "Integration Test Results: Available in artifacts"
