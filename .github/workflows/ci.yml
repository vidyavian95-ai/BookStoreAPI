name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

# -------------------------
# 1. BUILD + TEST + ANALYSIS
# -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # -------------------------
      # Run Maven build + tests
      # -------------------------
      - name: Build & Run Tests
        run: mvn clean verify -Dspring.profiles.active=test

      # -------------------------
      # SpotBugs Analysis (after build)
      # -------------------------
      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:4.8.6.1:check

      - name: Upload SpotBugs Report
        uses: lcollins/spotbugs-github-action@v3.2.0
        with:
          path: '**/spotbugsXml.xml'

      # -------------------------
      # SonarQube Scan (AFTER build)
      # -------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vidyavian95-ai_BookStoreAPI
            -Dsonar.organization=vidyavian95-ai
            -Dsonar.projectName=BookStoreAPI
            -Dsonar.java.binaries=target/classes

      # -------------------------
      # Build Docker Image
      # -------------------------
      - name: Build Docker Image
        run: |
          docker build -t bookstoreapi:latest .

      # -------------------------
      # AWS Credentials
      # -------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # -------------------------
      # Login to ECR
      # -------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Build & Push Docker Image
      # -------------------------
      - name: Push Docker Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: bookstoreapi
          IMAGE_TAG: latest
        run: |
          docker tag bookstoreapi:latest $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # -------------------------
      # Deploy to Elastic Beanstalk
      # -------------------------
      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          application-name: "demo-bookstoreapi"
          environment-name: "demo-bookstoreapi-env"
          version-label: ${{ github.sha }}
          region: ap-south-1
          deployment-package: Dockerrun.aws.json